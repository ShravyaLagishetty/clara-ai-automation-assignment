version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: clara_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - NODE_ENV=production
      - GENERIC_TIMEZONE=Asia/Kolkata
      - N8N_ALLOWED_FILESYSTEM_PATHS=/files
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./data:/home/node/.n8n-files/data
      - ./outputs:/home/node/.n8n-files/outputs
      - ./workflows:/home/node/.n8n-files/workflows
    restart: always